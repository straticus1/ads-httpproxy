# ClamAV module configuration for c-icap
# Virus scanning settings for ads-httpproxy

# File types to scan (space-separated)
clamav_mod.ScanFileTypes TEXT DATA EXECUTABLE ARCHIVE DOCUMENT MSOFFICE MSOXML PDF

# Maximum size of objects to scan (bytes)
clamav_mod.MaxObjectSize 5242880

# Send percentage data back to client
clamav_mod.SendPercentData 5

# Start sending percentage after this size (bytes)
clamav_mod.StartSendPercentDataAfter 2097152

# Temporary directory for file scanning
clamav_mod.TmpDir /tmp

# Maximum files to extract from archives
clamav_mod.MaxFilesInArchive 1000

# Maximum recursion level for archives
clamav_mod.MaxRecLevel 5

# Maximum file size to scan (bytes) - 100MB
clamav_mod.MaxScanSize 104857600

# ClamAV socket (Unix socket or TCP)
# For Docker: use TCP connection to clamav container
clamav_mod.ClamdSocket tcp:clamav:3310

# Response when virus found
clamav_mod.Action BLOCK

# Log virus detections
clamav_mod.LogVirus on

# Quarantine infected files
clamav_mod.VirSaveDir /var/quarantine
clamav_mod.VirSaveName virus_%f_%v_%u

# Scan mode
clamav_mod.ScanMode SIMPLE

# Allow bypassing scan for certain content types
clamav_mod.SkipContentTypes image/gif image/jpeg image/png

# Performance optimization
clamav_mod.PreviewSize 4096
clamav_mod.Pass204 on

# c-icap configuration for ClamAV virus scanning
# ads-httpproxy integration

# Server configuration
PidFile /var/run/c-icap/c-icap.pid
CommandsSocket /var/run/c-icap/c-icap.ctl
Timeout 300
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 600
StartServers 3
MaxServers 10
MinSpareThreads 10
MaxSpareThreads 20
ThreadsPerChild 10
MaxRequestsPerChild 0

# Ports and interfaces
Port 1344
# ServerAdmin admin@localhost
ServerName c-icap

# Logging
DebugLevel 1
AccessLog /var/log/c-icap/access.log
ServerLog /var/log/c-icap/server.log

# Modules
ModulesDir /usr/lib/c-icap
Module common http_auth.so
Module logger sys_logger.so

# Services
ServicesDir /usr/lib/c-icap
Service echo srv_echo.so
Service clamav srv_clamav.so

# ClamAV service specific
clamav.Pass 204
clamav.Allow204 on
clamav.PreviewSize 4096
clamav.MaxObjectSize 5M
clamav.SendPercentData 5
clamav.StartSendPercentDataAfter 2M

# File types to scan
clamav.ScanFileTypes TEXT DATA EXECUTABLE ARCHIVE DOCUMENT BINARY

# ClamAV daemon connection
clamav.ClamAvTmpDir /tmp
clamav.ClamAvMaxFilesInArchive 1000
clamav.ClamAvMaxFileSize 100M
clamav.ClamAvMaxRecLevel 5

# Template for virus found
clamav.VirSaveDir /var/quarantine
clamav.VirSaveName virus_%f_%v_%u
clamav.VirHTTPServer localhost

# Performance tuning
clamav.MaxMemObjectSize 10M
TmpDir /tmp

# ACL for access control
acl all src 0.0.0.0/0.0.0.0
icap_access allow all

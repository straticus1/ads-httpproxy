# ===================================================================
# Linux Kernel Tuning for ads-httpproxy
# ===================================================================
#
# Installation:
#   sudo cp sysctl-proxy-tuning.conf /etc/sysctl.d/99-proxy-tuning.conf
#   sudo sysctl -p /etc/sysctl.d/99-proxy-tuning.conf
#
# Verification:
#   sysctl -a | grep -E "tcp_congestion|rmem_max|tcp_fastopen"
#
# ===================================================================

# ---------------------------
# TCP Fast Open (TFO)
# ---------------------------
# Reduces connection latency by 1 RTT
# 1=client, 2=server, 3=both
net.ipv4.tcp_fastopen = 3

# ---------------------------
# TCP Buffer Sizes
# ---------------------------
# Essential for high-bandwidth, high-latency connections
# Format: min default max (in bytes)

# Receive buffers (16MB max)
net.ipv4.tcp_rmem = 4096 87380 16777216
net.core.rmem_max = 16777216
net.core.rmem_default = 262144

# Send buffers (16MB max)
net.ipv4.tcp_wmem = 4096 65536 16777216
net.core.wmem_max = 16777216
net.core.wmem_default = 262144

# ---------------------------
# UDP Buffer Sizes (for QUIC/HTTP3)
# ---------------------------
# QUIC requires larger UDP buffers (25MB)
net.core.rmem_max = 26214400
net.core.wmem_max = 26214400
net.ipv4.udp_rmem_min = 4096
net.ipv4.udp_wmem_min = 4096

# ---------------------------
# TCP Congestion Control
# ---------------------------
# BBR (Bottleneck Bandwidth and RTT) - Google's algorithm
# Better performance than default CUBIC, especially for:
# - High bandwidth-delay product networks
# - Packet loss environments
# - Variable latency connections
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq    # Fair Queue required for BBR

# Alternative: CUBIC (default, also good)
# net.ipv4.tcp_congestion_control = cubic

# ---------------------------
# Connection Handling
# ---------------------------
# SYN queue size (pending connections)
net.ipv4.tcp_max_syn_backlog = 8192

# Listen backlog (accept queue)
net.core.somaxconn = 4096

# Network device receive queue
net.core.netdev_max_backlog = 5000

# ---------------------------
# Connection Reuse & Cleanup
# ---------------------------
# Reuse TIME_WAIT sockets (safe for proxies)
net.ipv4.tcp_tw_reuse = 1

# Reduce TIME_WAIT duration (default: 60s)
net.ipv4.tcp_fin_timeout = 30

# ---------------------------
# TCP Keep-Alive
# ---------------------------
# Detect dead connections

# Start probes after 5 minutes idle
net.ipv4.tcp_keepalive_time = 300

# Probe interval (seconds)
net.ipv4.tcp_keepalive_intvl = 30

# Probes before giving up
net.ipv4.tcp_keepalive_probes = 9

# ---------------------------
# TCP Retries
# ---------------------------
# Reduce connection timeout

# SYN retries (default: 6, reduce to 3)
net.ipv4.tcp_syn_retries = 3

# SYN-ACK retries
net.ipv4.tcp_synack_retries = 3

# ---------------------------
# TCP Performance Features
# ---------------------------
# Enable window scaling (essential for modern networks)
net.ipv4.tcp_window_scaling = 1

# Enable Selective ACK (better loss recovery)
net.ipv4.tcp_sack = 1

# Enable TCP timestamps (RTT measurement)
net.ipv4.tcp_timestamps = 1

# Disable slow start after idle (controversial, test carefully)
net.ipv4.tcp_slow_start_after_idle = 0

# MTU probing (discover optimal packet size)
net.ipv4.tcp_mtu_probing = 1

# ---------------------------
# Port Range
# ---------------------------
# Increase available outbound ports
net.ipv4.ip_local_port_range = 10000 65535

# ---------------------------
# File Descriptors
# ---------------------------
# Increase max open files (each connection = 1 FD)
fs.file-max = 2097152

# ---------------------------
# inotify Limits
# ---------------------------
# If using file watchers (config reload, etc.)
fs.inotify.max_user_watches = 524288

# ---------------------------
# Network Core
# ---------------------------
# Packets processed per NAPI poll
net.core.netdev_budget = 600

# Microseconds per NAPI poll
net.core.netdev_budget_usecs = 8000

# ---------------------------
# Connection Tracking (if using iptables/netfilter)
# ---------------------------
# Increase conntrack table size
net.netfilter.nf_conntrack_max = 1048576

# Reduce tracking timeouts
net.netfilter.nf_conntrack_tcp_timeout_established = 600
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30

# ---------------------------
# Security
# ---------------------------
# SYN flood protection
net.ipv4.tcp_syncookies = 1

# Reverse path filtering (prevent IP spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Disable ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Disable source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# ---------------------------
# IPv6 (if using IPv6)
# ---------------------------
# net.ipv6.conf.all.forwarding = 1
# net.ipv6.conf.default.forwarding = 1

# ===================================================================
# Verification Commands
# ===================================================================
#
# Check applied settings:
#   sysctl net.ipv4.tcp_congestion_control
#   sysctl net.core.rmem_max
#   sysctl net.ipv4.tcp_fastopen
#
# Monitor connections:
#   watch -n1 'ss -s'
#   watch -n1 'netstat -an | grep -c ESTABLISHED'
#   watch -n1 'netstat -an | grep -c TIME_WAIT'
#
# Check packet drops:
#   netstat -s | grep -i drop
#   netstat -su | grep "packet receive errors"
#
# ===================================================================
